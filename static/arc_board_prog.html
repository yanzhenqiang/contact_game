<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Drawing App with Chat</title>
    <style>
        #container {
            display: flex;
            flex-direction: row;
        }

        #canvas {
            border: 1px solid black;
        }

        #controls {
            margin: 10px;
        }

        #task-info {
            margin-bottom: 10px;
            font-weight: bold;
        }

        #control-buttons {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }

        #control-buttons button {
            padding: 5px;
            cursor: pointer;
        }

        #reset-controls {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            /* 允许控件换行 */
            gap: 5px;
            /* 控件之间的间距 */
            align-items: center;
            /* 垂直居中对齐 */
        }

        #reset-controls input,
        #reset-controls select,
        #reset-controls button {
            margin-right: 5px;
            /* 控件之间的水平间距 */
        }

        #chat-container {
            width: 300px;
            margin: 10px;
            border: 1px solid #ccc;
            padding: 10px;
        }

        #chat-messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 5px;
            margin-bottom: 10px;
        }

        #chat-input {
            width: 100%;
            padding: 5px;
        }

        #send-button {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div id="container">
        <div>
            <canvas id="canvas"></canvas>
            <div id="controls">
                <div id="task-info">Task ID: Loading... | Key: Loading...</div>
                <div id="reset-controls">
                    <button onclick="resetBoard()">Reset Current</button>
                    <button onclick="nextBoard()">Next</button>
                    <button onclick="randomBoard()">Random</button>
                    <button onclick="replayHistory()">Replay</button>
                    <input type="number" id="taskIdInput" placeholder="Task ID" min="0" style="width: 80px;">
                    <button onclick="resetToId()">Reset to ID</button>
                    <input type="text" id="remarkInput" placeholder="Remark (optional)" style="width: 120px;">
                    <button onclick="saveHistory()">Save</button>
                    <select id="load-select" style="width: 200px;"></select>
                    <button onclick="loadHistory()">Load</button>
                </div>
                <div id="control-buttons">
                    <button onclick="sendKey('Up')">↑</button>
                    <button onclick="sendKey('Left')">←</button>
                    <button onclick="sendKey('Right')">→</button>
                    <button onclick="sendKey('Down')">↓</button>
                    <button onclick="sendKey('p')">Pick (p)</button>
                    <button onclick="sendKey('P')">Pick (P)</button>
                    <button onclick="sendKey('f')">Fill (f)</button>
                    <button onclick="sendKey('F')">Flood (F)</button>

                    <button onclick="sendKey('1')">Select (1)</button>
                    <button onclick="sendKey('2')">Region (2)</button>
                    <button onclick="sendKey('3')">Diagonal (3)</button>
                    <button onclick="sendKey('u')">Unselect (u)</button>
                    <button onclick="sendKey('U')">Unselect All (U)</button>
                    <button onclick="sendKey('r')">Rotate (r)</button>
                    <button onclick="sendKey('v')">Flip (v)</button>
                    <button onclick="sendKey('c')">Copy (c)</button>

                    <button onclick="sendKey('w')">Up (w)</button>
                    <button onclick="sendKey('a')">Left (a)</button>
                    <button onclick="sendKey('s')">Down (s)</button>
                    <button onclick="sendKey('d')">Right (d)</button>
                    <button onclick="sendKey('W')">Insert Up (W)</button>
                    <button onclick="sendKey('A')">Insert Left (A)</button>
                    <button onclick="sendKey('S')">Insert Down (S)</button>
                    <button onclick="sendKey('D')">Insert Right (D)</button>

                    <button onclick="sendKey('z')">Undo (z)</button>
                </div>
            </div>
        </div>
        <div id="chat-container">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Type your message...">
            <button id="send-button" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        let width = 1920;
        let height = 960;

        fetch('/render/')
            .then(response => response.json())
            .then(data => {
                const img = new Image();
                img.onload = function () {
                    width = img.width;
                    height = img.height;
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = 'data:image/png;base64,' + data.static_image;
            })
            .then(() => updateTaskInfo());

        // Mouse action
        canvas.addEventListener('mousedown', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            fetch('/mouse_action/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ press: true, x: x, y: y })
            })
                .then(response => response.json())
                .then(data => {
                    updateCanvas();
                    if (data.status === 'done') {
                        alert(data.message);
                    }
                });
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'R') {
                replayHistory();
            } else {
                const validKeys = ['Left', 'Right', 'Up', 'Down', 'p', 'P', 'f', 'F', '1', '2', '3', 'u', 'U', 'w', 'a', 's', 'd', 'r', 'v', 'c', 'W', 'A', 'S', 'D', 'z'];
                const key = event.key === 'ArrowLeft' ? 'Left' :
                    event.key === 'ArrowRight' ? 'Right' :
                        event.key === 'ArrowUp' ? 'Up' :
                            event.key === 'ArrowDown' ? 'Down' : event.key;
                if (validKeys.includes(key)) {
                    sendKey(key);
                }
            }
        });

        function sendKey(key) {
            console.log('Sending:', key);
            fetch('/keyboard_action/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: key })
            })
                .then(response => response.json())
                .then(data => {
                    updateCanvas();
                    if (data.status === 'done') {
                        alert(data.message);
                    }
                });
        }

        function resetBoard() {
            fetch('/reset/', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    updateCanvas();
                    updateTaskInfo(data.task_id, data.task_key);
                });
        }

        function resetToId() {
            const taskId = document.getElementById('taskIdInput').value;
            if (taskId === '') return;
            fetch('/reset_to_id/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_id: parseInt(taskId) })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        updateCanvas();
                        updateTaskInfo(data.task_id, data.task_key);
                    } else {
                        alert(data.message);
                    }
                });
        }

        function nextBoard() {
            fetch('/next/', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    updateCanvas();
                    updateTaskInfo(data.task_id, data.task_key);
                });
        }

        function randomBoard() {
            fetch('/random/', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    updateCanvas();
                    updateTaskInfo(data.task_id, data.task_key);
                });
        }

        async function replayHistory() {
            const response = await fetch('/get_history/');
            const data = await response.json();
            const history = data.history;

            if (!history || history.length <= 1) {
                alert('No actions to replay.');
                return;
            }

            const actionToKeyMap = {
                'left': 'Left',
                'right': 'Right',
                'up': 'Up',
                'down': 'Down',
                'pill_foreground': 'p',
                'pill_background': 'P',
                'fill': 'f',
                'flood_fill': 'F',
                'select': '1',
                'region_select': '2',
                'diagonal_select': '3',
                'unselect': 'u',
                'unselect_all': 'U',
                'undo': 'z',
                'move_left': 'a',
                'move_right': 'd',
                'move_up': 'w',
                'move_down': 's',
                'rotate': 'r',
                'flip': 'v',
                'copy': 'c',
                'insert_left': 'A',
                'insert_right': 'D',
                'insert_up': 'W',
                'insert_down': 'S'
            };

            for (let i = 0; i < history.length; i++) {
                const action = history[i];
                await new Promise(resolve => setTimeout(resolve, 500));
                if (action.action === 'init') {
                    const response = await fetch('/reset_to_id/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ task_id: action.task_id })
                    });
                    const data = await response.json();
                    if (data.status === 'success') {
                        updateTaskInfo(data.task_id, data.task_key);
                    } else {
                        alert(data.message);
                    }
                }
                else if (action.action === 'mouse') {
                    await fetch('/mouse_action/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ press: action.press, x: action.x, y: action.y })
                    });
                } else {
                    const actionName = action.action;
                    const key = actionToKeyMap[actionName] || actionName;
                    console.log(`Replaying keyboard action: ${actionName} -> ${key}`);
                    await fetch('/keyboard_action/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ key: key })
                    });
                }
                updateCanvas();
            }
        }

        function sendMessage() {
            const message = chatInput.value.trim();
            if (message) {
                appendMessage('You', message);
                chatInput.value = '';

                fetch('/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                })
                    .then(response => response.json())
                    .then(data => {
                        appendMessage('Bot', data.response);
                    })
                    .catch(error => {
                        appendMessage('Error', 'Failed to get response: ' + error);
                    });
            }
        }

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        // Canvas and task info update
        function updateCanvas() {
            fetch('/render/')
                .then(response => response.json())
                .then(data => {
                    const img = new Image();
                    img.onload = function () {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0);
                    };
                    img.src = 'data:image/png;base64,' + data.static_image;
                    if (data.status === 'done') {
                        alert(data.message);
                    }
                });
        }

        function updateTaskInfo(taskId, taskKey) {
            document.getElementById('task-info').textContent = `Task ID: ${taskId} | Key: ${taskKey}`;
        }

        function saveHistory() {
            const remark = document.getElementById('remarkInput').value.trim();
            fetch('/save/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ remark: remark })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('History saved successfully!');
                        populateLoadOptions();
                    } else {
                        alert('Failed to save history: ' + data.message);
                    }
                })
                .catch(error => {
                    alert('Error saving history: ' + error);
                });
        }

        function populateLoadOptions() {
            fetch('/load_options/')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('load-select');
                    select.innerHTML = '<option value="">Select a history entry</option>';
                    if (data.status === 'success' && data.options.length > 0) {
                        data.options.forEach(option => {
                            const opt = document.createElement('option');
                            opt.value = option.index;
                            opt.text = `${option.date} | Task ${option.task_id} | Actions: ${option.actions_count} | ${option.remark}`;
                            select.appendChild(opt);
                        });
                    } else {
                        const opt = document.createElement('option');
                        opt.text = 'No valid history entries';
                        select.appendChild(opt);
                    }
                });
        }

        function loadHistory() {
            const select = document.getElementById('load-select');
            const index = select.value;
            if (index === '') {
                alert('Please select a history entry to load.');
                return;
            }
            fetch('/load/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index: parseInt(index) })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        replayHistory();
                    } else {
                        alert('Failed to load history: ' + data.message);
                    }
                })
                .catch(error => {
                    alert('Error loading history: ' + error);
                });
        }

        window.onload = function () {
            populateLoadOptions();
            updateTaskInfo();
        };
    </script>
</body>

</html>
